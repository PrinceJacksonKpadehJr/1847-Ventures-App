<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Superuser Dashboard Selector</title>
    <style>
        :root {
            --ink: #162419;
            --muted: #5f6f64;
            --paper: #f3efe4;
            --panel: #ffffff;
            --line: rgba(22, 36, 25, 0.14);
            --forest: #1f6a43;
            --forest-deep: #0f4a2b;
            --sand: #dbcda6;
            --shadow: 0 18px 40px rgba(16, 30, 21, 0.16);
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Segoe UI", Arial, sans-serif;
            color: var(--ink);
            background:
                radial-gradient(circle at 8% 0%, rgba(156, 207, 83, 0.2), transparent 26%),
                radial-gradient(circle at 90% 100%, rgba(219, 205, 166, 0.3), transparent 28%),
                linear-gradient(180deg, #f7f5ee 0%, #efe9dc 100%);
        }

        .shell {
            width: min(1120px, calc(100% - 36px));
            margin: 30px auto;
        }

        .hero {
            border: 1px solid var(--line);
            border-radius: 24px;
            padding: 28px;
            box-shadow: var(--shadow);
            background:
                linear-gradient(150deg, rgba(15, 74, 43, 0.96), rgba(31, 106, 67, 0.93));
            color: #fff;
            margin-bottom: 18px;
        }

        .eyebrow {
            display: inline-block;
            font-size: 0.78rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.82);
            margin-bottom: 8px;
        }

        .hero h1 {
            margin: 0 0 8px;
            font-size: clamp(1.7rem, 3.6vw, 2.4rem);
        }

        .hero p {
            margin: 0;
            color: rgba(255, 255, 255, 0.86);
            max-width: 72ch;
        }

        .cards {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 14px;
        }

        .card {
            display: block;
            text-decoration: none;
            color: inherit;
            border: 1px solid var(--line);
            background: var(--panel);
            border-radius: 18px;
            padding: 18px;
            box-shadow: var(--shadow);
            transition: transform 0.12s ease, box-shadow 0.12s ease, border-color 0.12s ease;
        }

        .card:hover {
            transform: translateY(-2px);
            box-shadow: 0 22px 42px rgba(16, 30, 21, 0.19);
            border-color: rgba(31, 106, 67, 0.4);
        }

        .card h2 {
            margin: 0 0 8px;
            font-size: 1.06rem;
            color: var(--forest-deep);
        }

        .card p {
            margin: 0;
            font-size: 0.92rem;
            color: var(--muted);
        }

        .actions {
            margin-top: 16px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .action {
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 40px;
            padding: 10px 14px;
            border-radius: 999px;
            border: 1px solid var(--line);
            font-weight: 700;
            font-size: 0.9rem;
        }

        .action.primary {
            color: #fff;
            background: linear-gradient(180deg, var(--forest), var(--forest-deep));
            border-color: transparent;
        }

        .action.secondary {
            background: rgba(255, 255, 255, 0.85);
            color: var(--ink);
        }

        @media (max-width: 980px) {
            .cards {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }
        }

        @media (max-width: 680px) {
            .cards {
                grid-template-columns: 1fr;
            }

            .shell {
                width: calc(100% - 22px);
                margin: 16px auto;
            }

            .hero {
                padding: 20px;
            }

            .actions {
                flex-direction: column;
            }

            .action {
                width: 100%;
            }
        }

        @media (max-width: 520px) {
            .hero {
                padding: 16px 14px;
                border-radius: 14px;
            }

            .hero p {
                font-size: 0.9rem;
            }

            .card {
                border-radius: 12px;
                padding: 14px;
            }

            .card p {
                font-size: 0.88rem;
            }
        }
    </style>
</head>
<body>
    <main class="shell">
        <section class="hero">
            <div class="eyebrow">Superuser Control</div>
            <h1>Select any dashboard</h1>
            <p>
                You have full platform access. Choose the dashboard context you want to enter for operations,
                troubleshooting, or oversight.
            </p>
        </section>

        <section class="cards">
            {% for item in dashboard_links %}
                <a class="card" href="{% url 'superuser_dashboard_gate' %}?next={{ item.url|urlencode }}">
                    <h2>{{ item.label }}</h2>
                    <p>{{ item.description }}</p>
                </a>
            {% endfor %}
        </section>

        <div class="actions">
            <a class="action primary" href="{% url 'superuser_dashboard_gate' %}?next={% url 'admin_dashboard' %}">Open Admin Dashboard</a>
            <form method="post" action="{% url 'logout' %}" style="margin:0;" data-offline-queue="false">{% csrf_token %}<button type="submit" class="action secondary" style="cursor:pointer;">Logout</button></form>
        </div>
    </main>
</body>
</html>
