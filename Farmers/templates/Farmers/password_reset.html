<!DOCTYPE html>
<html>
<head>
    <title>Password Reset — 1847 Ventures</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f4f4; padding-top: 80px; text-align: center; }
        .box { background: white; width: 400px; margin: auto; padding: 30px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.15); }
        input[type=email] { width: 90%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 4px; }
        button { padding: 10px 24px; background: #2c7a3a; color: white; border: none; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>
<div class="box">
    <h2>Reset Password</h2>
    <p>Enter your email to receive a password reset link.</p>
    <form method="POST">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Send Reset Link</button>
    </form>
</div>
</body>
</html>
