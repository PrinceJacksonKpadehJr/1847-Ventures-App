<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Request Password Reset</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f3f6f4;
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 20px;
        }
        .card {
            width: min(460px, 95vw);
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.08);
            padding: 24px;
        }
        h1 {
            margin: 0 0 8px;
            font-size: 1.35rem;
            color: #17452a;
        }
        p {
            margin: 0 0 14px;
            color: #50685a;
            font-size: 0.92rem;
        }
        form p { margin-bottom: 10px; }
        input {
            width: 100%;
            padding: 10px;
            border: 1px solid #cfd8d3;
            border-radius: 8px;
        }
        button {
            margin-top: 8px;
            padding: 10px 14px;
            border: none;
            border-radius: 8px;
            background: #1d6d3f;
            color: #fff;
            font-weight: 700;
            cursor: pointer;
        }
        .msg {
            background: #e9f5ed;
            border-left: 4px solid #1d6d3f;
            color: #17452a;
            padding: 8px 10px;
            border-radius: 6px;
            margin-bottom: 10px;
            font-size: 0.9rem;
        }
        .back {
            display: inline-block;
            margin-top: 12px;
            font-size: 0.88rem;
        }

        @media (max-width: 640px) {
            body {
                padding: 12px;
            }
            .card {
                padding: 18px 14px;
                border-radius: 10px;
            }
            h1 {
                font-size: 1.2rem;
            }
            p {
                font-size: 0.88rem;
            }
            button {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Request Password Reset Link</h1>
        <p>Submit your account details. An admin will receive a notification and share a reset link.</p>

        {% if messages %}
            {% for message in messages %}
                <div class="msg">{{ message }}</div>
            {% endfor %}
        {% endif %}

        <form method="post" autocomplete="off">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit">Send Request</button>
        </form>
        <script>
        (function(){
            var u=document.querySelector('input[name="username"]');
            if(u){u.setAttribute('autocomplete','off');}
        })();
        </script>

        <a class="back" href="{% url 'login' %}">Back to login</a>
    </div>
</body>
</html>
