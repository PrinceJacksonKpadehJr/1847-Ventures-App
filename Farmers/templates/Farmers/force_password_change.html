<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Change Password Required</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 20px;
            font-family: Arial, sans-serif;
            background: linear-gradient(160deg, #f2f7f4 0%, #deeee4 100%);
        }
        .card {
            width: min(520px, 96vw);
            background: #fff;
            border-radius: 14px;
            box-shadow: 0 10px 28px rgba(0,0,0,0.1);
            padding: 26px;
        }
        h1 {
            margin: 0 0 10px;
            font-size: 1.45rem;
            color: #164a2d;
        }
        p {
            margin: 0 0 16px;
            color: #557767;
            line-height: 1.5;
        }
        form p { margin-bottom: 10px; }
        input {
            width: 100%;
            padding: 10px;
            border: 1px solid #cbdad1;
            border-radius: 8px;
        }
        button {
            margin-top: 8px;
            border: none;
            border-radius: 8px;
            background: #1e6e41;
            color: #fff;
            font-weight: 700;
            padding: 10px 14px;
            cursor: pointer;
        }

        @media (max-width: 640px) {
            body {
                padding: 12px;
            }
            .card {
                padding: 18px 14px;
                border-radius: 10px;
            }
            h1 {
                font-size: 1.24rem;
            }
            p {
                font-size: 0.92rem;
            }
            button {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Password Update Required</h1>
        <p>
            For security, you must change your temporary password before accessing your dashboard.
        </p>
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit">Update Password</button>
        </form>
    </div>
</body>
</html>
