{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Set Your Password – 1847 Ventures</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f4f4; margin: 0; padding-top: 80px; text-align: center; }
        .box { background: white; width: 380px; margin: auto; padding: 36px; border-radius: 10px; box-shadow: 0 4px 16px rgba(0,0,0,0.12); text-align: left; }
        h2 { text-align: center; color: #2e7d32; margin-bottom: 6px; }
        .subtitle { text-align: center; color: #666; font-size: 0.9em; margin-bottom: 20px; }
        label { display: block; margin-top: 14px; font-weight: bold; font-size: 0.9em; color: #333; }
        input[type=password] { width: 100%; padding: 10px; margin-top: 6px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-size: 0.95em; }
        input[type=password]:focus { border-color: #2e7d32; outline: none; }
        .btn { display: block; width: 100%; margin-top: 20px; padding: 12px; background: #2e7d32; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 1em; }
        .btn:hover { background: #1b5e20; }
        .msg-error { background: #ffcdd2; border-left: 4px solid #c62828; padding: 10px 14px; border-radius: 4px; margin-bottom: 12px; color: #b71c1c; font-size: 0.9em; }
        .msg-success { background: #c8e6c9; border-left: 4px solid #2e7d32; padding: 10px 14px; border-radius: 4px; margin-bottom: 12px; color: #1b5e20; font-size: 0.9em; }
        .back { text-align: center; margin-top: 16px; font-size: 0.88em; }
        .back a { color: #2e7d32; text-decoration: none; }
    </style>
</head>
<body>

<div class="box">
    <h2>1847 Ventures</h2>
    <div class="subtitle">
        Set your password for account <strong>{{ username }}</strong>
    </div>

    {% if messages %}
        {% for message in messages %}
            <div class="{% if message.tags == 'success' %}msg-success{% else %}msg-error{% endif %}">
                {{ message }}
            </div>
        {% endfor %}
    {% endif %}

    <form method="POST">
        {% csrf_token %}
        <label for="password1">New Password <span style="color:red">*</span></label>
        <input type="password" id="password1" name="password1" placeholder="At least 8 characters" required>

        <label for="password2">Confirm Password <span style="color:red">*</span></label>
        <input type="password" id="password2" name="password2" placeholder="Repeat your password" required>

        <button class="btn" type="submit">Set Password &amp; Continue</button>
    </form>

    <div class="back">
        <a href="{% url 'login' %}">&larr; Back to Login</a>
    </div>
</div>

</body>
</html>
