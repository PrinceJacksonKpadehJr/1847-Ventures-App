<!DOCTYPE html>
<html>
<head>
    <title>Set Your Password — 1847 Ventures</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f4f4; padding-top: 80px; text-align: center; }
        .box { background: white; width: 400px; margin: auto; padding: 30px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.15); }
        input[type=password] { width: 90%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 4px; }
        button { padding: 10px 24px; background: #2c7a3a; color: white; border: none; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>
<div class="box">
    <h2>Set Your Password</h2>
    <p>Welcome to 1847 Ventures! Please set a password to activate your account.</p>
    {% if validlink %}
    <form method="POST">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Set Password</button>
    </form>
    {% else %}
    <p style="color:#c0392b;">This link is invalid or has expired. Please contact your field agent.</p>
    {% endif %}
</div>
</body>
</html>
