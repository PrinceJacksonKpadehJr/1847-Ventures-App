<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Set Your Password — 1847 Ventures</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 20px;
            text-align: center;
        }
        .box {
            background: white;
            width: min(460px, 96vw);
            margin: auto;
            padding: 26px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
        }
        form p {
            text-align: left;
            margin: 10px 0;
        }
        input[type=password] {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 6px;
        }
        button {
            padding: 10px 24px;
            background: #2c7a3a;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 700;
        }

        @media (max-width: 560px) {
            .box {
                padding: 18px 14px;
            }
            h2 {
                font-size: 1.2rem;
            }
            button {
                width: 100%;
            }
        }
    </style>
</head>
<body>
<div class="box">
    <h2>Set Your Password</h2>
    <p>Welcome to 1847 Ventures! Please set a password to activate your account.</p>
    {% if validlink %}
    <form method="POST">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Set Password</button>
    </form>
    {% else %}
    <p style="color:#c0392b;">This link is invalid or has expired. Please contact your field agent.</p>
    {% endif %}
</div>
</body>
</html>
