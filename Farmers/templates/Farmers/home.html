{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>1847 Ventures Platform</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f4f4f4;
        }

        h1 {
            margin-top: 30px;
        }

        .container {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 40px;
        }

        .card {
            margin: 20px;
            padding: 15px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            width: 200px;
            transition: 0.3s;
        }

        .card:hover {
            transform: scale(1.05);
        }

        .card img {
            width: 100%;
            height: 150px;
            object-fit: contain;
        }

        .card a {
            text-decoration: none;
            color: black;
            font-weight: bold;
            display: block;
            margin-top: 10px;
        }
    </style>
</head>

<body>

    <h1>Welcome to 1847 Ventures</h1>
    <h3>Sustainable Cocoa Management System</h3>

   <div class="container">

    <div class="card">
        <a href="{% url 'login' %}">
            <img src="{% static 'Farmers/images/farmer.png' %}" alt="Partner">
            Click Here To Log-In
        </a>
    </div>


</div>

</body>
</html>
