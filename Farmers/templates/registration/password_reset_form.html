<!DOCTYPE html>
<html>
<head>
    <title>Password Reset – 1847 Ventures</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f4f4; text-align: center; padding-top: 80px; }
        .box { background: white; width: 380px; margin: auto; padding: 30px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.15); text-align: left; }
        h2 { color: #2d6a4f; }
        input[type=email] { width: 100%; padding: 9px; margin: 8px 0; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { background: #2d6a4f; color: white; padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; width: 100%; margin-top: 10px; }
        button:hover { background: #1b4332; }
    </style>
</head>
<body>
<div class="box">
    <h2>Reset Password</h2>
    <p>Enter your email address and we'll send you a link to set a new password.</p>
    <form method="POST">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Send Password Reset Email</button>
    </form>
</div>
</body>
</html>
