databases:
  - name: 1847-ventures-db
    plan: free
    databaseName: ventures
    user: ventures_user

services:
  - type: web
    name: 1847-ventures-app
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate
    startCommand: gunicorn An_1847_Ventures.wsgi:application
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: false
      - key: DJANGO_SECURE_SSL_REDIRECT
        value: true
      - key: DJANGO_SESSION_COOKIE_SECURE
        value: true
      - key: DJANGO_CSRF_COOKIE_SECURE
        value: true
      - key: DJANGO_SECURE_HSTS_SECONDS
        value: 31536000
      - key: DJANGO_SECURE_HSTS_INCLUDE_SUBDOMAINS
        value: false
      - key: DJANGO_SECURE_HSTS_PRELOAD
        value: false
      - key: DATABASE_URL
        fromDatabase:
          name: 1847-ventures-db
          property: connectionString